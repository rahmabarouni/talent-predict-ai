# ============================================================
# GitLab CI/CD — AI Service (Python/FastAPI)
# ============================================================

stages:
  - install
  - build
  - docker
  - deploy

# --------------------------------------------------
# Global settings
# --------------------------------------------------
variables:
  DOCKER_IMAGE: "mohamedabdeladhim/talentpredict-ai"
  DOCKER_TAG: "$CI_COMMIT_SHORT_SHA"
  CONTAINER_NAME: "talentpredict-ai"

# pip dependency cache
cache:
  key:
    files:
      - talentpredict-ai/requirements.txt
  paths:
    - talentpredict-ai/.pip-cache/
  policy: pull-push

# --------------------------------------------------
# Stage: install
# --------------------------------------------------
install:
  stage: install
  image: python:3.11-slim
  script:
    - cd talentpredict-ai
    - pip install --cache-dir .pip-cache -r requirements.txt --quiet

# --------------------------------------------------
# Stage: build
# --------------------------------------------------
build:
  stage: build
  image: python:3.11-slim
  script:
    - cd talentpredict-ai
    - pip install --cache-dir .pip-cache -r requirements.txt --quiet
    - python -c "import main; print('Build OK')"

# --------------------------------------------------
# Stage: docker — pushes to Docker Hub
# --------------------------------------------------
docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
  script:
    - cd talentpredict-ai
    - docker build
        --cache-from "$DOCKER_IMAGE:latest"
        -t "$DOCKER_IMAGE:$DOCKER_TAG"
        -t "$DOCKER_IMAGE:latest"
        .
    - docker push "$DOCKER_IMAGE:$DOCKER_TAG"
    - docker push "$DOCKER_IMAGE:latest"
  rules:
    - when: always

# --------------------------------------------------
# Stage: deploy — SSH into your server and run container
# --------------------------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_SERVER_IP "
        echo '$DOCKER_HUB_PASSWORD' | docker login -u '$DOCKER_HUB_USERNAME' --password-stdin &&
        docker pull $DOCKER_IMAGE:$DOCKER_TAG &&
        docker stop $CONTAINER_NAME || true &&
        docker rm $CONTAINER_NAME || true &&
        docker run -d \
          --name $CONTAINER_NAME \
          --restart unless-stopped \
          -p 8000:8000 \
          -e OPENAI_API_KEY=$OPENAI_API_KEY \
          -e OLLAMA_BASE_URL=$OLLAMA_BASE_URL \
          -e DATABASE_URL=$AI_DATABASE_URL \
          $DOCKER_IMAGE:$DOCKER_TAG
      "
  rules:
    - when: manual
  environment:
    name: production
    url: http://$DEPLOY_SERVER_IP:8000
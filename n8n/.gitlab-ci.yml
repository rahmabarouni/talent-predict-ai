# ============================================================
# GitLab CI/CD — n8n Service
# ============================================================

stages:
  - build
  - docker
  - deploy

# --------------------------------------------------
# Global settings
# --------------------------------------------------
variables:
  DOCKER_IMAGE: "mohamedabdeladhim/talentpredict-n8n"
  DOCKER_TAG: "$CI_COMMIT_SHORT_SHA"
  CONTAINER_NAME: "talentpredict-n8n"

# --------------------------------------------------
# Stage: build — validate config files
# --------------------------------------------------
build:
  stage: build
  image: node:22-alpine
  script:
    - cd n8n/custom
    - npm install --quiet
    - echo "Validating workflows.json..."
    - node -e "JSON.parse(require('fs').readFileSync('workflows.json')); console.log('workflows.json valid')"
    - echo "Validating package.json..."
    - node -e "JSON.parse(require('fs').readFileSync('package.json')); console.log('package.json valid')"
    - echo "Build OK"

# --------------------------------------------------
# Stage: docker — pushes to Docker Hub
# --------------------------------------------------
docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
  script:
    - cd n8n/custom
    - docker build
        --cache-from "$DOCKER_IMAGE:latest"
        -t "$DOCKER_IMAGE:$DOCKER_TAG"
        -t "$DOCKER_IMAGE:latest"
        .
    - docker push "$DOCKER_IMAGE:$DOCKER_TAG"
    - docker push "$DOCKER_IMAGE:latest"
  rules:
    - when: always

# --------------------------------------------------
# Stage: deploy — SSH into your server and run container
# --------------------------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_SERVER_IP "
        echo '$DOCKER_HUB_PASSWORD' | docker login -u '$DOCKER_HUB_USERNAME' --password-stdin &&
        docker pull $DOCKER_IMAGE:$DOCKER_TAG &&
        docker stop $CONTAINER_NAME || true &&
        docker rm $CONTAINER_NAME || true &&
        docker run -d \
          --name $CONTAINER_NAME \
          --restart unless-stopped \
          -p 5678:5678 \
          -e N8N_BASIC_AUTH_ACTIVE=true \
          -e N8N_BASIC_AUTH_USER=$N8N_USER \
          -e N8N_BASIC_AUTH_PASSWORD=$N8N_PASSWORD \
          -e N8N_ENCRYPTION_KEY=$N8N_ENCRYPTION_KEY \
          -e DB_TYPE=postgresdb \
          -e DB_POSTGRESDB_HOST=$N8N_DB_HOST \
          -e DB_POSTGRESDB_DATABASE=$N8N_DB_NAME \
          -e DB_POSTGRESDB_USER=$N8N_DB_USER \
          -e DB_POSTGRESDB_PASSWORD=$N8N_DB_PASSWORD \
          -v /opt/talentpredict/n8n:/home/node/.n8n \
          $DOCKER_IMAGE:$DOCKER_TAG
      "
  rules:
    - when: manual
  environment:
    name: production
    url: http://$DEPLOY_SERVER_IP:5678
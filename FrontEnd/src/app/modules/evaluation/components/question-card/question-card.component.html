<div class="question-card" [class.answered]="currentAnswer">
  <div class="question-header">
    <span class="question-number">Q{{ questionNumber }}</span>
    @if (category) {
      <span class="question-category">{{ category }}</span>
    }
  </div>
  
  <div class="question-text">
    <p>{{ question }}</p>
  </div>

  <div class="rating-scale">
    <div class="scale-labels">
      <span class="label-start">Pas du tout d'accord</span>
      <span class="label-end">Tout à fait d'accord</span>
    </div>
    
    <div class="rating-options">
      @for (option of ratingOptions; track option.value) {
        <button
          type="button"
          class="rating-button"
          [class.selected]="isSelected(option.value)"
          (click)="selectRating(option.value)"
          [attr.aria-label]="option.label"
        >
          <span class="rating-value">{{ option.value }}</span>
          <span class="rating-label">{{ option.label }}</span>
        </button>
      }
    </div>
  </div>
</div>
